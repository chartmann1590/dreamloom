name: Release Android Build And Site

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-and-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK and AAB
        env:
          MODEL_SHA256: ${{ secrets.DREAMLOOM_MODEL_SHA256 }}
        run: |
          if [ -z "$MODEL_SHA256" ]; then
            echo "DREAMLOOM_MODEL_SHA256 secret is missing."
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease -Pdreamloom.modelSha256="$MODEL_SHA256"

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Dreamloom build ${{ github.sha }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

  deploy-site:
    name: Deploy Download Website
    runs-on: ubuntu-latest
    needs: build-release
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
