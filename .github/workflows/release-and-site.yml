name: Release Android Build And Site

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-and-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 0.1.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_B64 secret is missing."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Apply CI version bump and signing properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Android signing secrets are missing."
            exit 1
          fi
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version_code = os.environ["VERSION_CODE"]
          version_name = os.environ["VERSION_NAME"]
          path = Path("app/build.gradle.kts")
          content = path.read_text(encoding="utf-8")
          content = re.sub(r"versionCode\s*=\s*\d+", f"versionCode = {version_code}", content, count=1)
          content = re.sub(r'versionName\s*=\s*"[^"]+"', f'versionName = "{version_name}"', content, count=1)
          content = re.sub(r"isMinifyEnabled\s*=\s*true", "isMinifyEnabled = false", content, count=1)
          path.write_text(content, encoding="utf-8")
          PY
          cat <<EOF >> local.properties
          dreamloom.release.storeFile=$RUNNER_TEMP/release.keystore
          dreamloom.release.storePassword=$KEYSTORE_PASSWORD
          dreamloom.release.keyAlias=$KEY_ALIAS
          dreamloom.release.keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK and AAB
        env:
          MODEL_SHA256: ${{ secrets.DREAMLOOM_MODEL_SHA256 }}
        run: |
          if [ -z "$MODEL_SHA256" ]; then
            echo "DREAMLOOM_MODEL_SHA256 secret is missing."
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease \
            -Pdreamloom.modelSha256="$MODEL_SHA256" \
            -x lintVitalRelease

      - name: Collect release artifacts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          out = Path("release-artifacts")
          out.mkdir(exist_ok=True)

          apk_candidates = sorted(Path("app/build/outputs/apk/release").glob("*.apk"))
          aab_candidates = sorted(Path("app/build/outputs/bundle/release").glob("*.aab"))

          if not apk_candidates:
              raise SystemExit("No APK found under app/build/outputs/apk/release")
          if not aab_candidates:
              raise SystemExit("No AAB found under app/build/outputs/bundle/release")

          shutil.copy2(apk_candidates[0], out / "app-release.apk")
          shutil.copy2(aab_candidates[0], out / "app-release.aab")
          print(f"Using APK: {apk_candidates[0]}")
          print(f"Using AAB: {aab_candidates[0]}")
          PY

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ github.sha }}
          name: Dreamloom v${{ env.VERSION_NAME }} (${{ github.sha }})
          generate_release_notes: true
          files: |
            release-artifacts/app-release.apk
            release-artifacts/app-release.aab

  deploy-site:
    name: Deploy Download Website
    runs-on: ubuntu-latest
    needs: build-release
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
