name: Security Audit And Play Compliance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Android static checks
        run: |
          chmod +x ./gradlew
          ./gradlew :app:lintDebug :app:testDebugUnitTest --no-daemon

      - name: Install MobSFScan
        run: python -m pip install --upgrade mobsfscan

      - name: Run MobSFScan
        run: |
          mobsfscan app/src/main --json -o mobsfscan.json || true

      - name: Upload MobSFScan report
        uses: actions/upload-artifact@v4
        with:
          name: mobsfscan-report
          path: mobsfscan.json
          if-no-files-found: error

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  play-compliance:
    name: Google Play Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Play policy guardrails
        run: python .github/scripts/play_compliance_check.py
